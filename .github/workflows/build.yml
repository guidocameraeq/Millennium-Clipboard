name: Build Windows (portable .exe)

# Portado de Monarch (build-personal.yml), adaptado a Millennium:
#  - npm (no yarn): frontend vanilla, sin bundler ⇒ SIN paso "build frontend".
#  - bundle.active=false en tauri.conf ⇒ `tauri build` no genera instalador;
#    el artefacto es el .exe portable directo.
#  - crt-static ya viene de .cargo/config.toml (VC++ Redist no requerido).
# SPEC-displays: este workflow es el único gate que COMPILA Y LINKEA de verdad
# (el de plataforma vive aparte, en `android-cfg-gate.yml`, y solo type-checkea). El
# build local está roto (el toolchain default es windows-gnu y le falta
# dlltool.exe; forzar el target MSVC tampoco alcanza porque faltan las C++ Build
# Tools), así que "compila" solo se puede afirmar desde acá.
#  - Fase 0: probó que `windows 0.60` (raw-dylib) ENLAZA en el runner MSVC,
#    mediante un smoke que referenciaba una función CCD real.
#  - Fase 1: ese smoke lo reemplazó el motor de verdad (`src/displays/`), que
#    llama esa misma familia de funciones ⇒ un build verde sigue probando el
#    linkeo, ahora con el código posta.

on:
  workflow_dispatch:
  push:
    branches: [main, feat/displays]

permissions:
  contents: read

jobs:
  build:
    name: Build portable millennium-clipboard.exe
    runs-on: windows-latest
    # 90 (no 60): la 1ra corrida en frio compila LTO+codegen-units=1 sobre un
    # arbol pesado + DOS versiones del crate windows (0.60 pineado + 0.61.x
    # transitivo de tauri/wry). Cacheado baja a ~20-30 min.
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust (MSVC target)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install JS dependencies (Tauri CLI)
        run: npm ci

      - name: Build portable .exe
        run: npm run tauri build

      - name: Upload portable .exe
        uses: actions/upload-artifact@v4
        with:
          name: millennium-clipboard-${{ github.sha }}
          if-no-files-found: error
          path: src-tauri/target/release/millennium-clipboard.exe

name: Android cfg gate

# Gate BARATO de aislamiento de plataforma. NO construye la app de Android: solo
# type-checkea el crate para `aarch64-linux-android`, que es todo lo que hace
# falta para cazar una FUGA DE CFG — código windows-only que se escapa de su
# `#[cfg(target_os = "windows")]` y termina compilándose en Android.
#
# Por qué existe: desde el SPEC-displays el árbol tiene mucho código windows-only
# (`src/displays/`, el crate `windows` y el vendor `monarch`, los dos bajo el
# target-table de Windows del Cargo.toml). Hasta acá ese aislamiento estaba
# revisado por LECTURA y nunca probado: el único job era windows-latest, donde
# TODO compila y por definición una fuga no se nota.
#
# Por qué `cargo check` y no `tauri android build`:
#  - El build de verdad necesita JDK + Gradle + SDK y compila 4 ABIs: 20-40 min.
#  - Depende de `src-tauri/gen/android/`, que en este repo se edita a mano y es
#    zona de la regla dura "NUNCA correr tauri android init".
#  - Y no agrega señal: una fuga de cfg revienta en el type-check, mucho antes de
#    llegar al linker o a Gradle.
# Un solo ABI alcanza: el `cfg` que decide es `target_os`, que vale igual para
# los cuatro. Chequear los otros tres sería pagar 4x por la misma respuesta.
#
# El NDK NO se descarga: `ubuntu-latest` lo trae preinstalado en
# `ANDROID_NDK_ROOT`. Se usa solo porque `ring` (el proveedor cripto de rustls)
# compila C en su build.rs y necesita un compilador para el target.

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - feat/displays
      # Branches descartables para probar el gate mismo (romper un cfg a
      # propósito y ver que lo caza) sin disparar el build pesado de Windows,
      # que no las escucha.
      - 'ci/**'

permissions:
  contents: read

jobs:
  android-cfg-gate:
    name: cargo check (aarch64-linux-android)
    runs-on: ubuntu-latest
    # Generoso a propósito: en frío son ~5-8 min. Si alguna vez se acerca a esto,
    # el gate dejó de ser barato y hay que replantearlo.
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust (target Android)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      # `ring` compila C con el crate `cc`, que busca estas variables por target.
      # Sin ellas intenta un `aarch64-linux-android-clang` pelado, que en los NDK
      # modernos no existe (el binario lleva el nivel de API en el nombre).
      # 24 = el `minSdk` de gen/android/app/build.gradle.kts.
      - name: Apuntar el compilador C al NDK preinstalado
        run: |
          NDK_BIN="$ANDROID_NDK_ROOT/toolchains/llvm/prebuilt/linux-x86_64/bin"
          test -x "$NDK_BIN/aarch64-linux-android24-clang" || {
            echo "::error::No está el clang del NDK en $NDK_BIN"; exit 1; }
          echo "CC_aarch64_linux_android=$NDK_BIN/aarch64-linux-android24-clang" >> "$GITHUB_ENV"
          echo "AR_aarch64_linux_android=$NDK_BIN/llvm-ar" >> "$GITHUB_ENV"
          echo "CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER=$NDK_BIN/aarch64-linux-android24-clang" >> "$GITHUB_ENV"

      # --locked: si el check tuviera que tocar Cargo.lock, falla en vez de
      # resolver versiones distintas de las que se probaron.
      - name: Chequear que el crate compila para Android
        working-directory: src-tauri
        run: cargo check --locked --target aarch64-linux-android

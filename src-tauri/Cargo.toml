[package]
name = "millennium-clipboard"
version = "0.1.0"
description = "Share text and files between devices on the same LAN"
authors = ["guidocameraeq"]
edition = "2021"

[lib]
name = "millennium_clipboard_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }
tauri-plugin-opener = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"


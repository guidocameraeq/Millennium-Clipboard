[package]
name = "millennium-clipboard"
version = "0.1.0"
description = "Share text and files between devices on the same LAN"
authors = ["guidocameraeq"]
edition = "2021"

[lib]
name = "millennium_clipboard_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }
tauri-plugin-opener = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# mDNS discovery and identity (Fase 3)
mdns-sd = "0.13"
local-ip-address = "0.6"
hostname = "0.4"
uuid = { version = "1", features = ["v4"] }

